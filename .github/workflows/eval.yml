name: eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
          pip install pylint

      - name: Validate JSONL datasets
        run: |
          python -c "
          import json, sys
          for f in ['data/train.jsonl', 'data/eval.jsonl']:
              with open(f, encoding='utf-8') as fh:
                  for i, line in enumerate(fh, 1):
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          json.loads(line)
                      except json.JSONDecodeError as e:
                          print(f'{f}:{i} invalid JSON: {e}')
                          sys.exit(1)
              print(f'{f}: OK')
          "

      - name: Lint with pylint
        run: |
          pylint app.py inference.py --disable=all --enable=E --exit-zero

      - name: Run baseline vs fine-tuned comparison
        run: |
          python compare_baseline_vs_finetuned.py
        continue-on-error: true
